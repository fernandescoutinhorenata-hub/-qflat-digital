<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Segurança -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
  <link rel="icon" href="data:,">

  <!-- SEO -->
  <meta name="description" content="flat. agência digital especializada em design, social mídia e identidade visual. Atendemos todo o Brasil.">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (WhatsApp/redes sociais) -->
  <meta property="og:title" content="flat. a sua agência digital">
  <meta property="og:description" content="Design que gera resultado. Flyers, banners, social mídia e identidade visual para sua marca.">
  <meta property="og:type" content="website">

  <title>Qflat Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: oklch(45% 0.22 280);
      --purple-light: oklch(55% 0.20 280);
      --purple-pale: oklch(95% 0.05 280);
      --purple-mid: oklch(30% 0.18 280);
      --purple-dark: oklch(18% 0.12 280);
      --orange: oklch(68% 0.19 45);
      --orange-hover: oklch(62% 0.21 45);
      --white: #ffffff;
      --gray-50: oklch(98% 0.005 280);
      --gray-100: oklch(94% 0.01 280);
      --gray-200: oklch(88% 0.015 280);
      --gray-400: oklch(70% 0.02 280);
      --gray-600: oklch(50% 0.02 280);
      --gray-800: oklch(28% 0.03 280);
      --text: oklch(18% 0.04 280);
      --font-head: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --shadow-sm: 0 2px 8px oklch(45% 0.22 280 / 0.08);
      --shadow-md: 0 4px 24px oklch(45% 0.22 280 / 0.12);
      --shadow-lg: 0 12px 48px oklch(45% 0.22 280 / 0.18);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      color: var(--text);
      background: var(--white);
      overflow-x: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--gray-100); }
    ::-webkit-scrollbar-thumb { background: var(--purple-light); border-radius: 99px; }

    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="./tweaks-panel.jsx"></script>
  <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
